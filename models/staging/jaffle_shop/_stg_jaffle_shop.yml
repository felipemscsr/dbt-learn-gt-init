models:
  - name: stg_jaffle_shop__customers
    description: One customer per row
    columns:
      - name: customer_id
        description: Primary key for customers table
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: The first name of the customer
        data_tests:
          - not_null
      - name: last_name
        data_tests:
          - not_null
        description: The last name of the customer
  - name: stg_jaffle_shop__orders
    description: One order per row
    columns:
      - name: order_id
        description: Primary key for orders table
        data_tests:
          - unique
          - not_null
      - name: order_status
        description: "{{ doc('order_status') }}"
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - completed
                  - shipped
                  - placed
                  - return_pending
                  - returned
      - name: customer_id
        description: Foreign key for orders table
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: customer_id
                to: ref('stg_jaffle_shop__customers')
